<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Random</title>
    <link rel="stylesheet" href="detail.css">
</head>
<body>

<header class="navbar">
    <div class="logo">🔮 Tarot</div>
    <nav>
        <a href="../../index.html">Trang chủ</a>
    </nav>
</header>

<main class="detail">
    <section class="detail-card">
        <h1 class="title" id="title">TÊN CHỦ ĐỀ</h1>

        <div class="detail-container">
            <div class="detail-img">
                <div class="flip-card">
                    <div class="flip-card-inner" id="card-inner">
                        <div class="flip-card-front">
                            <img src="../../assets/images/card.jpg" alt="Mặt sau lá bài">
                        </div>
                        
                        <div class="flip-card-back">
                            <img id="card-img" src="../../assets/images/main.jpg" alt="Tarot">
                        </div>
                    </div>
                </div>
            </div>

            <div class="detail-text">
                <h2>Thông điệp hôm nay</h2>
                <p id="message">Nội dung sẽ xuất hiện ở đây</p>

                <div class="actions">
                    <button class="btn" onclick="drawCard()">🔄 Rút thêm lá bài</button>
                    <a href="../../index.html" class="btn back">⬅️ Quay về trang chủ</a>
                </div>
            </div>
        </div>
    </section>
</main>

<script>
async function drawCard() {
    const cardInner = document.getElementById("card-inner");

    // 1. Úp bài xuống ngay khi bấm nút (nếu đang lật)
    cardInner.classList.remove("flipped");

    try {
        document.getElementById("title").innerText = "Đang xin thông điệp...";
        document.getElementById("message").innerText = "Vũ trụ đang xáo bài...";

        // Đợi 0.4s để hiệu ứng úp bài kịp chạy xong
        await new Promise(resolve => setTimeout(resolve, 400));

        // 2. Gọi API lấy bài mới
        const response = await fetch(`/api/draw?t=${new Date().getTime()}`);
        const card = await response.json();

        if (card.error) {
            document.getElementById("message").innerText = card.error;
            return;
        }

        // 3. Thay đổi thông tin trong lúc bài đang úp
        document.getElementById("title").innerText = card.category;
        document.getElementById("card-img").src = card.img;
        document.getElementById("card-img").alt = card.category;
        document.getElementById("message").innerText = card.message;

        // 4. Lật bài lên mặt ngửa
        setTimeout(() => {
            cardInner.classList.add("flipped");
        }, 150);
        
    } catch (error) {
        console.error("Lỗi khi kết nối:", error);
        document.getElementById("message").innerText = "Mất kết nối đến server. Vui lòng thử lại sau.";
    }
}

window.onload = drawCard;
</script>

</body>
</html>
