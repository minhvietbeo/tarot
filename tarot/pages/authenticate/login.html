<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập / Đăng ký</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-page">

    <a href="../../index.html" class="home-fixed">🏠 Trang chủ</a>

    <div class="auth-box">
        <form id="loginForm" class="form active">
            <h2>🔐 Đăng nhập</h2>

            <input type="text" placeholder="Tên đăng nhập" required>
            <input type="password" placeholder="Mật khẩu" required>

            <button type="submit">Đăng nhập</button>

            <p>
                Chưa có tài khoản?
                <a href="#" id="goRegister">Đăng ký</a>
            </p>
        </form>

        <form id="registerForm" class="form">
            <h2>📝 Đăng ký</h2>

            <input type="text" placeholder="Tên đăng nhập" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Mật khẩu" required>
            <input type="password" placeholder="Nhập lại mật khẩu" required>

            <button type="submit">Đăng ký</button>

            <p>
                Đã có tài khoản?
                <a href="#" id="goLogin">Đăng nhập</a>
            </p>
        </form>

    </div>

</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');

    document.getElementById("goRegister").onclick = function(e){
        e.preventDefault();
        loginForm.classList.remove("active");
        registerForm.classList.add("active");
    };

    document.getElementById("goLogin").onclick = function(e){
        e.preventDefault();
        registerForm.classList.remove("active");
        loginForm.classList.add("active");
    };

    // API Đăng nhập (Đã thêm gửi Password)
    if(loginForm) {
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const inputs = loginForm.querySelectorAll('input');
            const usernameInput = inputs[0].value;
            const passwordInput = inputs[1].value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: usernameInput,
                        password: passwordInput
                    })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = '/'; 
                } else {
                    alert(data.error);
                }
            } catch (error) {
                console.error("Lỗi đăng nhập:", error);
                alert("Lỗi kết nối tới Server!");
            }
        });
    }

    // API Đăng ký
    if(registerForm) {
        registerForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const inputs = registerForm.querySelectorAll('input');
            const username = inputs[0].value;
            const email = inputs[1].value;
            const password = inputs[2].value;
            const confirmPassword = inputs[3].value;

            if (password !== confirmPassword) {
                alert("Mật khẩu nhập lại không khớp!");
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    alert("Đăng ký thành công! Vũ trụ chào đón bạn. Hãy đăng nhập nhé.");
                    
                    registerForm.reset();
                    registerForm.classList.remove("active");
                    loginForm.classList.add("active");
                } else {
                    alert(data.error);
                }
            } catch (error) {
                console.error("Lỗi đăng ký:", error);
                alert("Mất kết nối tới Server!");
            }
        });
    }
</script>

</body>
</html>
